# ============================================================
# docker-compose.yml — WhatsApp RAG Clean (Refrimix Core v2)
# ============================================================
# Minimal stack: FastAPI (refrimix_core v2) + Redis
# Evolution API roda separadamente (mesma network: whatsapp-rag_evo_network)
# ============================================================

services:
  # --- Redis local para filas e cache ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - default

  # --- FastAPI (Refrimix Core v2 pipeline) ---
  fastapi-rag:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REFRIMIX_CORE_VERSION=v2
      - MINIMAL_MVP_ENABLED=${MINIMAL_MVP_ENABLED:-1}
      - RAG_ENABLED=${RAG_ENABLED:-0}
      - TTS_ENABLED=${TTS_ENABLED:-0}
      - VISION_ENABLED=${VISION_ENABLED:-0}
      - STT_ENABLED=${STT_ENABLED:-0}
      - PTBR_SANITIZER_ENABLED=${PTBR_SANITIZER_ENABLED:-0}
      # Redis (nome do serviço Docker)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # Qdrant (só se RAG_ENABLED=1)
      - QDRANT_URL=${QDRANT_URL:-http://localhost:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-hermes_hvac_rag_service_staging}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - evolution_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./.ssh:/root/.ssh:ro
    ports:
      - "127.0.0.1:8000:8000"

networks:
  evolution_net:
    external: true
    name: whatsapp-rag_evo_network

volumes:
  fastapi_data:
  redis_data: