services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    network_mode: host
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY}
      - DATABASE_URL=${EVOLUTION_DATABASE_URL}
      - DATABASE_CONNECTION_URI=${EVOLUTION_DATABASE_URL}
      - DATABASE_PROVIDER=postgresql
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution-data:/evolution/data

  fastapi-rag:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - REDIS_URL=redis://127.0.0.1:6379
      - QDRANT_URL=http://127.0.0.1:6333
      - QDRANT_COLLECTION=hermes_hvac_rag_service_staging
      - LOCAL_QWEN_BASE_URL=${LOCAL_QWEN_BASE_URL:-http://127.0.0.1:8011/v1}
      - LOCAL_QWEN_MODEL=${LOCAL_QWEN_MODEL:-qwen2.5-vl-7b-instruct}
      - LOCAL_PTBR_BASE_URL=${LOCAL_PTBR_BASE_URL:-http://127.0.0.1:8211/v1}
      - LOCAL_PTBR_MODEL=${LOCAL_PTBR_MODEL:-qwen2.5-7b-pt-br-instruct}
      - MINIMAL_MVP_ENABLED=${MINIMAL_MVP_ENABLED:-1}
      - RAG_ENABLED=${RAG_ENABLED:-0}
      - TTS_ENABLED=${TTS_ENABLED:-0}
      - VISION_ENABLED=${VISION_ENABLED:-0}
      - GOOGLE_CALENDAR_ENABLED=${GOOGLE_CALENDAR_ENABLED:-0}
      - LEADS_SHEET_ENABLED=${LEADS_SHEET_ENABLED:-0}
      - PTBR_POLISH_ENABLED=${PTBR_POLISH_ENABLED:-0}
      - RESPONSE_GUARD_STRICT=${RESPONSE_GUARD_STRICT:-0}
    env_file:
      - .env
    depends_on:
      - evolution-api
    restart: unless-stopped
    network_mode: host
    command: >
      bash -c "cp -r /tmp/home/.ssh /root/.ssh &&
      cp /tmp/home/.ssh/pc1_zappro_ed25519 /root/.ssh/id_ed25519 &&
      chown -R root:root /root/.ssh &&
      chmod 700 /root/.ssh &&
      chmod 600 /root/.ssh/* &&
      exec python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ~/.ssh:/tmp/home/.ssh:ro
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.local/share/fastembed:/root/.local/share/fastembed

volumes:
  evolution_instances:
  evolution-data:
